<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Doodle Maker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div id="app" style="width:100%;height:100%;position:relative;overflow:hidden;">

  <canvas id="canvas" style="position:absolute;top:0;right:0;bottom:0;left:0;touch-action:none;"></canvas>

  <!-- Menu Toggle -->
  <button id="btn-menu" style="position:absolute;top:24px;right:24px;z-index:50;"
    class="w-14 h-14 rounded-full shadow-lg border-2 flex items-center justify-center transition-colors bg-gray-800 border-gray-700">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/>
    </svg>
  </button>

  <!-- Toolbar -->
  <div id="toolbar" style="position:absolute;top:96px;right:24px;z-index:40;display:flex;flex-direction:column;gap:12px;">
    <button id="btn-new-shape" title="New Shape"
      class="w-14 h-14 rounded-full bg-white shadow-lg border-2 border-gray-300 flex items-center justify-center hover:bg-gray-50 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
    </button>
    <button id="btn-clear" title="Clear"
      class="w-14 h-14 rounded-full bg-white shadow-lg border-2 border-gray-300 flex items-center justify-center hover:bg-gray-50 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
      </svg>
    </button>
    <button id="btn-download" title="Download"
      class="w-14 h-14 rounded-full bg-white shadow-lg border-2 border-gray-300 flex items-center justify-center hover:bg-gray-50 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>
      </svg>
    </button>
    <button id="btn-settings" title="Shape Settings"
      class="w-14 h-14 rounded-full bg-white shadow-lg border-2 border-gray-300 flex items-center justify-center hover:bg-gray-50 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
    <button id="btn-color" title="Color"
      class="w-14 h-14 rounded-full shadow-lg border-4 border-white hover:scale-105 transition-transform"
      style="background-color:#000000;"></button>
    <button id="btn-brush" title="Brush Size"
      class="w-14 h-14 rounded-full bg-white shadow-lg border-2 border-gray-300 flex items-center justify-center hover:bg-gray-50 transition-colors">
      <div id="brush-dot" class="rounded-full bg-gray-800" style="width:6px;height:6px;"></div>
    </button>
  </div>

  <!-- Download Modal -->
  <div id="preview-modal" class="bg-black/50 items-center justify-center" style="display:none;position:fixed;top:0;right:0;bottom:0;left:0;z-index:50;">
    <div class="bg-white rounded-lg shadow-2xl max-w-6xl w-[calc(100%-32px)] flex flex-col" style="max-height:calc(100vh - 32px);">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <div>
          <h2 class="text-xl font-bold text-gray-800">Download Doodles</h2>
          <p class="text-sm text-gray-500 mt-0.5">Select doodles to save:</p>
        </div>
        <button id="btn-close-preview" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
      <div class="overflow-auto p-4" style="flex:1;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div style="display:flex;flex-direction:column;">
            <h3 class="text-center font-semibold text-gray-700 mb-2">Before</h3>
            <div id="before-container" onclick="toggleImageSelection('before')"
              class="flex items-center justify-center rounded-lg p-2 cursor-pointer transition-all ring-1 ring-gray-200 opacity-50"
              style="flex:1;">
              <img id="before-img" style="max-width:100%;max-height:300px;object-fit:contain;" alt="Before">
            </div>
          </div>
          <div style="display:flex;flex-direction:column;">
            <h3 class="text-center font-semibold text-gray-700 mb-2">After</h3>
            <div id="after-container" onclick="toggleImageSelection('after')"
              class="flex items-center justify-center rounded-lg p-2 cursor-pointer transition-all ring-2 ring-blue-500 ring-offset-2"
              style="flex:1;">
              <img id="after-img" style="max-width:100%;max-height:300px;object-fit:contain;" alt="After">
            </div>
          </div>
        </div>
      </div>
      <div class="p-4 border-t border-gray-200 flex gap-3 justify-end items-center">
        <p id="mobile-hint" class="text-sm text-gray-500 text-center w-full" style="display:none;">Long press an image to save or share on mobile</p>
        <button id="btn-cancel-preview" class="px-6 py-3 rounded-lg bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium transition-colors">Cancel</button>
        <button id="btn-save-doodles" class="px-6 py-3 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-medium transition-colors flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>
          </svg>
          Save Doodles
        </button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="bg-black/50 items-center justify-center" style="display:none;position:fixed;top:0;right:0;bottom:0;left:0;z-index:50;">
    <div class="bg-white rounded-lg shadow-2xl max-w-md w-[calc(100%-32px)]">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <h2 class="text-xl font-bold text-gray-800">Shape Settings</h2>
        <button id="btn-close-settings" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
      <div class="p-4 space-y-4">
        <!-- Shape color -->
        <div class="flex justify-between items-center">
          <span class="text-gray-700 font-medium">Shape color</span>
          <div class="flex gap-2">
            <button id="shape-color-white" onclick="setShapesColor('#ffffff')"
              class="w-8 h-8 rounded-full border-2 border-blue-500 transition-all scale-110"
              style="background-color:#ffffff;"></button>
            <button id="shape-color-black" onclick="setShapesColor('#000000')"
              class="w-8 h-8 rounded-full border-2 border-gray-300 transition-all"
              style="background-color:#000000;"></button>
          </div>
        </div>
        <!-- Sliders -->
        <div id="sliders-container"></div>
      </div>
      <div class="p-4 border-t border-gray-200 flex justify-end">
        <button id="btn-done-settings" class="px-6 py-3 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-medium transition-colors">Done</button>
      </div>
    </div>
  </div>

</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  const pastels = ['#FFB3BA','#FFDFBA','#BAFFC9','#BAE1FF','#E0BBE4','#FFDFD3','#D4F1F4','#FFE5E5','#E5F9E0'];
  const brushSizes = [2, 8, 15, 22, 30];

  let ctx, isDrawing = false;
  let brushSize = 2, brushIndex = 0;
  let color = '#000000', colorIndex = 0;
  let menuOpen = true;
  let bgColor = randomPastel();
  let shapesColor = '#ffffff';
  let shapeSettings = { ovals: 2, quads: 1, rectangles: 1, curves: 1, triangles: 1 };
  let beforeImage = null, previewImage = null;
  let selectedImages = new Set(['after']);

  function randomPastel() {
    return pastels[Math.floor(Math.random() * pastels.length)];
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  function init() {
    const canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    buildSliders();
    generateRandomShape();
    bindEvents();
    updateCursor();

    window.addEventListener('resize', () => {
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.putImageData(img, 0, 0);
    });
  }

  // ── Sliders ───────────────────────────────────────────────────────────────
  function buildSliders() {
    const shapes = ['ovals', 'quads', 'rectangles', 'curves', 'triangles'];
    document.getElementById('sliders-container').innerHTML = shapes.map(s => `
      <div>
        <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span class="text-gray-700 font-medium" style="text-transform:capitalize;">${s}</span>
          <span id="val-${s}" class="text-gray-600 text-sm">${shapeSettings[s]}</span>
        </label>
        <input type="range" min="0" max="10" value="${shapeSettings[s]}"
          class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
          oninput="updateShapeSetting('${s}', this.value)">
      </div>
    `).join('');
  }

  function updateShapeSetting(shape, value) {
    shapeSettings[shape] = parseInt(value);
    document.getElementById('val-' + shape).textContent = value;
  }

  function setShapesColor(c) {
    shapesColor = c;
    document.getElementById('shape-color-white').className =
      'w-8 h-8 rounded-full border-2 transition-all ' + (c === '#ffffff' ? 'border-blue-500 scale-110' : 'border-gray-300');
    document.getElementById('shape-color-black').className =
      'w-8 h-8 rounded-full border-2 transition-all ' + (c === '#000000' ? 'border-blue-500 scale-110' : 'border-gray-300');
  }

  // ── Shape generation ──────────────────────────────────────────────────────
  function generateRandomShape() {
    const canvas = document.getElementById('canvas');
    bgColor = randomPastel();

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = shapesColor;

    const cx = canvas.width / 2, cy = canvas.height / 2;
    for (let i = 0; i < shapeSettings.ovals; i++)     drawOval(cx, cy);
    for (let i = 0; i < shapeSettings.quads; i++)     drawQuad(cx, cy);
    for (let i = 0; i < shapeSettings.rectangles; i++) drawRect(cx, cy);
    for (let i = 0; i < shapeSettings.curves; i++)    drawBezier(cx, cy);
    for (let i = 0; i < shapeSettings.triangles; i++) drawTriangle(cx, cy);

    // Sync brush color if on background color option
    if (colorIndex === 2) {
      color = bgColor;
      document.getElementById('btn-color').style.backgroundColor = color;
      updateCursor();
    }

    setTimeout(() => {
      const tmp = document.createElement('canvas');
      tmp.width = canvas.width; tmp.height = canvas.height;
      tmp.getContext('2d').drawImage(canvas, 0, 0);
      beforeImage = tmp.toDataURL('image/png');
    }, 100);
  }

  function drawOval(cx, cy) {
    const x = cx + (Math.random() - 0.5) * 400;
    const y = cy + (Math.random() - 0.5) * 400;
    ctx.beginPath();
    ctx.ellipse(x, y, 40 + Math.random() * 120, 40 + Math.random() * 120, Math.random() * Math.PI * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawQuad(cx, cy) {
    const ox = (Math.random() - 0.5) * 300, oy = (Math.random() - 0.5) * 300;
    const pts = Array.from({length: 4}, (_, i) => {
      const a = (i / 4) * Math.PI * 2 + (Math.random() - 0.5);
      const d = 60 + Math.random() * 100;
      return [cx + ox + Math.cos(a) * d, cy + oy + Math.sin(a) * d];
    });
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.closePath(); ctx.fill();
  }

  function drawRect(cx, cy) {
    const x = cx + (Math.random() - 0.5) * 400, y = cy + (Math.random() - 0.5) * 400;
    const w = 60 + Math.random() * 150, h = 60 + Math.random() * 150;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.random() * Math.PI * 2);
    ctx.fillRect(-w / 2, -h / 2, w, h);
    ctx.restore();
  }

  function drawBezier(cx, cy) {
    const canvas = document.getElementById('canvas');
    const size = (0.5 + Math.random() * 0.7) * canvas.width;
    const ox = (Math.random() - 0.5) * canvas.width * 0.25;
    const oy = (Math.random() - 0.5) * canvas.height * 0.25;
    const r = (f) => (Math.random() - 0.5) * size * f;
    const x1 = cx + ox + r(0.6), y1 = cy + oy + r(0.6);
    const x2 = cx + ox + r(0.6), y2 = cy + oy + r(0.6);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(cx + ox + r(1.4), cy + oy + r(1.4), cx + ox + r(1.4), cy + oy + r(1.4), x2, y2);
    ctx.bezierCurveTo(cx + ox + r(1.4), cy + oy + r(1.4), cx + ox + r(1.4), cy + oy + r(1.4), x1, y1);
    ctx.closePath(); ctx.fill();
  }

  function drawTriangle(cx, cy) {
    const ox = (Math.random() - 0.5) * 400, oy = (Math.random() - 0.5) * 400;
    const size = 60 + Math.random() * 120, rot = Math.random() * Math.PI * 2;
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = rot + (i / 3) * Math.PI * 2;
      const x = cx + ox + Math.cos(a) * size, y = cy + oy + Math.sin(a) * size;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.fill();
  }

  // ── Drawing ───────────────────────────────────────────────────────────────
  function getPos(e) {
    const rect = document.getElementById('canvas').getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  function onDown(e) {
    e.preventDefault();
    isDrawing = true;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
  }

  function onMove(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize;
    ctx.lineTo(p.x, p.y); ctx.stroke();
  }

  function onUp() { isDrawing = false; }

  // ── Cursor ────────────────────────────────────────────────────────────────
  function updateCursor() {
    const size = brushSize * 2;
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = size;
    const c = tmp.getContext('2d');
    c.beginPath();
    c.arc(size / 2, size / 2, brushSize, 0, Math.PI * 2);
    c.strokeStyle = color === bgColor ? '#666' : color === '#ffffff' ? '#000' : '#fff';
    c.lineWidth = 1; c.stroke();
    c.beginPath();
    c.arc(size / 2, size / 2, brushSize - 1, 0, Math.PI * 2);
    c.fillStyle = color; c.fill();
    document.getElementById('canvas').style.cursor = `url(${tmp.toDataURL()}) ${size/2} ${size/2}, crosshair`;
  }

  // ── Color & brush cycling ─────────────────────────────────────────────────
  function cycleColor() {
    colorIndex = (colorIndex + 1) % 3;
    color = ['#000000', '#ffffff', bgColor][colorIndex];
    document.getElementById('btn-color').style.backgroundColor = color;
    updateCursor();
  }

  function cycleBrush() {
    brushIndex = (brushIndex + 1) % brushSizes.length;
    brushSize = brushSizes[brushIndex];
    const s = Math.min(brushSize * 1.5, 36);
    const dot = document.getElementById('brush-dot');
    dot.style.width = dot.style.height = s + 'px';
    updateCursor();
  }

  function clearCanvas() {
    const canvas = document.getElementById('canvas');
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ── Menu ──────────────────────────────────────────────────────────────────
  function toggleMenu() {
    menuOpen = !menuOpen;
    const btn = document.getElementById('btn-menu');
    const tb = document.getElementById('toolbar');
    if (menuOpen) {
      btn.style.backgroundColor = '#1f2937'; btn.style.borderColor = '#374151';
      btn.querySelector('svg').setAttribute('stroke', 'white');
      tb.style.display = 'flex';
    } else {
      btn.style.backgroundColor = 'white'; btn.style.borderColor = '#d1d5db';
      btn.querySelector('svg').setAttribute('stroke', '#1f2937');
      tb.style.display = 'none';
    }
  }

  // ── Download modal ────────────────────────────────────────────────────────
  function openDownloadModal() {
    const canvas = document.getElementById('canvas');
    const tmp = document.createElement('canvas');
    tmp.width = canvas.width; tmp.height = canvas.height;
    tmp.getContext('2d').drawImage(canvas, 0, 0);
    previewImage = tmp.toDataURL('image/png');
    selectedImages = new Set(['after']);

    document.getElementById('before-img').src = beforeImage || '';
    document.getElementById('after-img').src = previewImage;
    updateImageSelection();

    // Show long-press hint on mobile, action buttons on desktop
    document.getElementById('mobile-hint').style.display      = isMobile ? 'block' : 'none';
    document.getElementById('btn-cancel-preview').style.display = isMobile ? 'none' : '';
    document.getElementById('btn-save-doodles').style.display   = isMobile ? 'none' : '';

    document.getElementById('preview-modal').style.display = 'flex';
  }

  function toggleImageSelection(key) {
    selectedImages.has(key) ? selectedImages.delete(key) : selectedImages.add(key);
    updateImageSelection();
    document.getElementById('btn-save-doodles').disabled = selectedImages.size === 0;
    document.getElementById('btn-save-doodles').style.opacity = selectedImages.size === 0 ? '0.4' : '1';
  }

  function updateImageSelection() {
    ['before', 'after'].forEach(key => {
      const el = document.getElementById(key + '-container');
      const sel = selectedImages.has(key);
      el.className = 'flex items-center justify-center rounded-lg p-2 cursor-pointer transition-all ' +
        (sel ? 'ring-2 ring-blue-500 ring-offset-2' : 'ring-1 ring-gray-200 opacity-50');
      el.style.flex = '1';
    });
  }

  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1;

  function downloadFile(dataUrl, filename) {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    a.click();
  }

  function saveDoodles() {
    if (selectedImages.has('before') && beforeImage) downloadFile(beforeImage, 'doodle-before-' + Date.now() + '.png');
    if (selectedImages.has('after') && previewImage) downloadFile(previewImage, 'doodle-after-' + Date.now() + '.png');
    document.getElementById('preview-modal').style.display = 'none';
  }

  // ── Event binding ─────────────────────────────────────────────────────────
  function bindEvents() {
    const canvas = document.getElementById('canvas');
    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onUp);
    canvas.addEventListener('mouseleave', onUp);
    canvas.addEventListener('touchstart', onDown, { passive: false });
    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('touchend', onUp);

    document.getElementById('btn-menu').addEventListener('click', toggleMenu);
    document.getElementById('btn-new-shape').addEventListener('click', generateRandomShape);
    document.getElementById('btn-clear').addEventListener('click', clearCanvas);
    document.getElementById('btn-download').addEventListener('click', openDownloadModal);
    document.getElementById('btn-settings').addEventListener('click', () => {
      document.getElementById('settings-modal').style.display = 'flex';
    });
    document.getElementById('btn-color').addEventListener('click', cycleColor);
    document.getElementById('btn-brush').addEventListener('click', cycleBrush);

    document.getElementById('btn-close-preview').addEventListener('click', () => {
      document.getElementById('preview-modal').style.display = 'none';
    });
    document.getElementById('btn-cancel-preview').addEventListener('click', () => {
      document.getElementById('preview-modal').style.display = 'none';
    });
    document.getElementById('btn-save-doodles').addEventListener('click', saveDoodles);

    document.getElementById('btn-close-settings').addEventListener('click', () => {
      document.getElementById('settings-modal').style.display = 'none';
    });
    document.getElementById('btn-done-settings').addEventListener('click', () => {
      document.getElementById('settings-modal').style.display = 'none';
    });
  }

  init();
</script>
</body>
</html>
